name: smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install jq
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq jq
          else
            brew list jq >/dev/null 2>&1 || brew install jq
          fi

      - name: Bash portability check
        run: |
          if grep -rnE 'declare -A|mapfile|readarray|\$\{[A-Za-z_][A-Za-z0-9_]*,,\}' bin/ scripts/; then
            echo "::error::bash 3.2-incompatible construct found (must stay portable to macOS /bin/bash)"
            exit 1
          fi
          echo "portability: clean"

      - name: Shellcheck
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get install -y -qq shellcheck
          else
            brew list shellcheck >/dev/null 2>&1 || brew install shellcheck
          fi
          shellcheck -S warning bin/*.sh scripts/*.sh install.sh hooks/*.sh 2>/dev/null \
            || shellcheck -S warning bin/*.sh scripts/*.sh hooks/*.sh

      - name: Smoke suite
        run: test/smoke.sh
