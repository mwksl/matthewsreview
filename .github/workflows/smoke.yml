name: smoke

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Install jq
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq jq
          else
            brew list jq >/dev/null 2>&1 || brew install jq
          fi

      - name: Bash portability check
        run: |
          if git grep -nE 'declare -A|mapfile|readarray|\$\{[A-Za-z_][A-Za-z0-9_]*,,\}' -- '*.sh'; then
            echo "::error::bash 3.2-incompatible construct found (must stay portable to macOS /bin/bash)"
            exit 1
          fi
          echo "portability: clean"

      - name: Shellcheck
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get install -y -qq shellcheck
          else
            brew list shellcheck >/dev/null 2>&1 || brew install shellcheck
          fi
          shellcheck -S warning bin/*.sh scripts/*.sh install.sh hooks/*.sh

      - name: Smoke suite
        run: test/smoke.sh
